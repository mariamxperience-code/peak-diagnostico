<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads Capturados - Método PEAK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --accent: #20c997;
            --text: #ffffff;
            --text-muted: #b0b0b0;
            --border: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #0d0d0d 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: var(--text);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--text);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .info-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-text {
            font-size: 1rem;
        }

        .info-count {
            font-size: 2rem;
            color: var(--accent);
            font-weight: 600;
        }

        .table-wrapper {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--bg);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            color: var(--accent);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: rgba(32, 201, 151, 0.05);
        }

        .copy-btn {
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.3s;
        }

        .copy-btn:hover {
            opacity: 0.9;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--accent);
            color: #0a0a0a;
        }

        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }

        .btn:hover {
            opacity: 0.9;
        }

        .success-message {
            background: rgba(32, 201, 151, 0.2);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            table {
                font-size: 0.9rem;
            }

            th, td {
                padding: 10px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .info-box {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Leads Capturados</h1>
            <p class="subtitle">Todos los datos del diagnóstico gratuito</p>
        </div>

        <div id="successMessage" class="success-message">
            ✅ Datos copiados al portapapeles
        </div>

        <div class="info-box">
            <div class="info-text">Leads totales capturados:</div>
            <div class="info-count" id="leadCount">0</div>
        </div>

        <div class="table-wrapper">
            <table id="leadsTable">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Tipo de Centro</th>
                        <th>Fecha</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="leadsBody">
                </tbody>
            </table>
            <div id="emptyState" class="empty-state">
                <div class="empty-state-icon">📭</div>
                <p>No hay leads capturados aún</p>
            </div>
        </div>

        <div class="action-buttons">
            <a href="index.html" class="btn btn-secondary">← Volver a Landing</a>
            <button class="btn btn-primary" onclick="copyAllToClipboard()">Copiar Todo</button>
            <button class="btn btn-secondary" onclick="clearAllLeads()">Limpiar Datos</button>
        </div>
    </div>

    <footer>
        <p>Método PEAK © 2025 | Los datos se guardan en tu navegador</p>
    </footer>

    <script>
        function loadLeads() {
            const allLeads = JSON.parse(localStorage.getItem('peak_leads') || '[]');
            const tbody = document.getElementById('leadsBody');
            const emptyState = document.getElementById('emptyState');
            const leadCount = document.getElementById('leadCount');

            tbody.innerHTML = '';
            leadCount.textContent = allLeads.length;

            if (allLeads.length === 0) {
                emptyState.style.display = 'block';
                document.getElementById('leaksTable').style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            document.getElementById('leaksTable').style.display = 'table';

            allLeads.forEach((lead, index) => {
                const fecha = new Date(lead.fecha).toLocaleDateString('es-ES', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${lead.nombre}</td>
                    <td>${lead.telefono}</td>
                    <td>${lead.tipo_centro}</td>
                    <td>${fecha}</td>
                    <td><button class="copy-btn" onclick="copySingleLead(${index})">Copiar</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        function copySingleLead(index) {
            const allLeads = JSON.parse(localStorage.getItem('peak_leads') || '[]');
            const lead = allLeads[index];
            const text = `${lead.nombre}\t${lead.telefono}\t${lead.tipo_centro}`;
            
            navigator.clipboard.writeText(text).then(() => {
                showSuccessMessage();
            });
        }

        function copyAllToClipboard() {
            const allLeads = JSON.parse(localStorage.getItem('peak_leads') || '[]');
            
            if (allLeads.length === 0) {
                alert('No hay leads para copiar');
                return;
            }

            let text = 'Nombre\tTeléfono\tTipo de Centro\n';
            allLeads.forEach(lead => {
                text += `${lead.nombre}\t${lead.telefono}\t${lead.tipo_centro}\n`;
            });

            navigator.clipboard.writeText(text).then(() => {
                showSuccessMessage();
            });
        }

        function showSuccessMessage() {
            const msg = document.getElementById('successMessage');
            msg.classList.add('show');
            setTimeout(() => {
                msg.classList.remove('show');
            }, 3000);
        }

        function clearAllLeads() {
            if (confirm('¿Seguro que quieres borrar todos los leads?')) {
                localStorage.removeItem('peak_leads');
                loadLeads();
            }
        }

        // Cargar leads al abrir la página
        window.addEventListener('DOMContentLoaded', loadLeads);
    </script>
</body>
</html>
