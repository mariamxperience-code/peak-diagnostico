<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico Método PEAK</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 650px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 15px;
      font-weight: 700;
    }

    .accent {
      color: #1cabb0;
    }

    .progress-bar {
      width: 100%;
      height: 5px;
      background: #1a1a1a;
      border-radius: 3px;
      margin-top: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #1cabb0;
      width: 0%;
      transition: width 0.4s ease;
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .question {
      margin-bottom: 30px;
    }

    .question label {
      display: block;
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 18px;
      line-height: 1.4;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      background: #1a1a1a;
      border: 2px solid #333333;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .option-wrapper:hover {
      border-color: #1cabb0;
      background: #1f1f1f;
    }

    .option-wrapper input[type="radio"] {
      margin-top: 2px;
      cursor: pointer;
      accent-color: #1cabb0;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .option-label {
      flex: 1;
      font-size: 1rem;
      line-height: 1.4;
      cursor: pointer;
    }

    .option-wrapper input[type="radio"]:checked + .option-label {
      color: #1cabb0;
      font-weight: 600;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 40px;
      justify-content: space-between;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button.prev {
      background: #333333;
      color: #ffffff;
      min-width: 120px;
    }

    button.prev:hover:not(:disabled) {
      background: #444444;
    }

    button.prev:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button.next {
      background: #1cabb0;
      color: #0a0a0a;
      flex: 1;
    }

    button.next:hover {
      background: #15959b;
    }

    /* RESULTADO */
    .result-section {
      display: none;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    .result-section.active {
      display: block;
    }

    .result-content h2 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #1cabb0;
    }

    .result-content p {
      font-size: 1.05rem;
      color: #cccccc;
      margin-bottom: 15px;
      line-height: 1.6;
    }

    .cta-button {
      display: inline-block;
      margin-top: 30px;
      padding: 16px 40px;
      background: #1cabb0;
      color: #0a0a0a;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 700;
      font-size: 1.1rem;
      transition: background 0.2s ease;
    }

    .cta-button:hover {
      background: #15959b;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }

      .controls {
        flex-direction: column;
      }

      button.prev {
        min-width: auto;
      }

      .option-wrapper {
        padding: 12px;
      }

      .question label {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Diagnóstico <span class="accent">PEAK</span></h1>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <!-- FORMULARIO DE PREGUNTAS -->
    <form id="diagnosisForm">
      <!-- PREGUNTA 1 -->
      <div class="form-section active" data-question="1">
        <div class="question">
          <label>¿Cuántos miembros activos tiene tu centro?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q1" value="less-50">
              <span class="option-label">Menos de 50 miembros</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q1" value="50-150">
              <span class="option-label">50 a 150 miembros</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q1" value="150-300">
              <span class="option-label">150 a 300 miembros</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q1" value="more-300">
              <span class="option-label">Más de 300 miembros</span>
            </label>
          </div>
        </div>
      </div>

      <!-- PREGUNTA 2 -->
      <div class="form-section" data-question="2">
        <div class="question">
          <label>¿Cuál es tu mayor desafío operativo?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q2" value="retention">
              <span class="option-label">Retención de miembros</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q2" value="acquisition">
              <span class="option-label">Captar nuevos miembros</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q2" value="operations">
              <span class="option-label">Operación y procesos</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q2" value="profitability">
              <span class="option-label">Rentabilidad</span>
            </label>
          </div>
        </div>
      </div>

      <!-- PREGUNTA 3 -->
      <div class="form-section" data-question="3">
        <div class="question">
          <label>¿Tienes un sistema integrado para gestionar tu negocio?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q3" value="no">
              <span class="option-label">No, todo es manual</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q3" value="partial">
              <span class="option-label">Tengo herramientas dispersas</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q3" value="yes">
              <span class="option-label">Sí, tengo un sistema integrado</span>
            </label>
          </div>
        </div>
      </div>

      <!-- PREGUNTA 4 -->
      <div class="form-section" data-question="4">
        <div class="question">
          <label>¿Cuánto inviertes mensualmente en tecnología?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q4" value="zero">
              <span class="option-label">$0 - No invierto</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q4" value="low">
              <span class="option-label">$1 - $100 USD</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q4" value="medium">
              <span class="option-label">$100 - $500 USD</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q4" value="high">
              <span class="option-label">Más de $500 USD</span>
            </label>
          </div>
        </div>
      </div>

      <!-- PREGUNTA 5 -->
      <div class="form-section" data-question="5">
        <div class="question">
          <label>¿Qué tan probable es que inviertas en mejorar operaciones?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q5" value="very-unlikely">
              <span class="option-label">Muy improbable</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q5" value="unlikely">
              <span class="option-label">Improbable</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q5" value="likely">
              <span class="option-label">Probable</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q5" value="very-likely">
              <span class="option-label">Muy probable</span>
            </label>
          </div>
        </div>
      </div>

      <!-- PREGUNTA 6 -->
      <div class="form-section" data-question="6">
        <div class="question">
          <label>¿Cuál es tu principal fuente de nuevos clientes?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q6" value="referral">
              <span class="option-label">Referidos</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q6" value="social">
              <span class="option-label">Redes sociales</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q6" value="ads">
              <span class="option-label">Publicidad pagada</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q6" value="none">
              <span class="option-label">No tengo un sistema definido</span>
            </label>
          </div>
        </div>
      </div>

      <!-- PREGUNTA 7 -->
      <div class="form-section" data-question="7">
        <div class="question">
          <label>¿Cuántos empleados tiene tu equipo?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q7" value="solo">
              <span class="option-label">Solo yo</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q7" value="1-3">
              <span class="option-label">1 a 3 empleados</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q7" value="4-10">
              <span class="option-label">4 a 10 empleados</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q7" value="more-10">
              <span class="option-label">Más de 10 empleados</span>
            </label>
          </div>
        </div>
      </div>

      <!-- PREGUNTA 8 -->
      <div class="form-section" data-question="8">
        <div class="question">
          <label>¿Cuál es tu objetivo principal para los próximos 6 meses?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q8" value="growth">
              <span class="option-label">Crecer en cantidad de miembros</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q8" value="efficiency">
              <span class="option-label">Mejorar la eficiencia operativa</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q8" value="revenue">
              <span class="option-label">Aumentar ingresos por miembro</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q8" value="scale">
              <span class="option-label">Escalar a múltiples centros</span>
            </label>
          </div>
        </div>
      </div>

      <!-- CONTROLES -->
      <div class="controls">
        <button type="button" class="prev" disabled>← Anterior</button>
        <button type="button" class="next">Siguiente →</button>
      </div>
    </form>

    <!-- SECCIÓN DE RESULTADO -->
    <div class="result-section">
      <div class="result-content">
        <h2>¡Diagnóstico Completado!</h2>
        <p>Hemos analizado tus respuestas y estamos listos para mostrarte el plan personalizado para tu centro.</p>
        <p style="font-size: 0.95rem; color: #999999;">Agenda tu sesión de consultoría gratuita con Mariam para conocer cómo Método PEAK puede transformar tu negocio.</p>
        <a href="https://calendly.com/mariamxperience/metodo-peak" class="cta-button">Agendar Sesión Gratuita</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('diagnosisForm');
    const sections = document.querySelectorAll('.form-section');
    const prevBtn = document.querySelector('button.prev');
    const nextBtn = document.querySelector('button.next');
    const resultSection = document.querySelector('.result-section');
    const progressFill = document.querySelector('.progress-fill');

    let currentQuestion = 0;
    const totalQuestions = sections.length;

    function updateProgress() {
      const progress = ((currentQuestion + 1) / totalQuestions) * 100;
      progressFill.style.width = progress + '%';
    }

    function showQuestion(index) {
      sections.forEach((section, i) => {
        section.classList.remove('active');
        if (i === index) section.classList.add('active');
      });

      prevBtn.disabled = index === 0;
      nextBtn.textContent = index === totalQuestions - 1 ? 'Enviar →' : 'Siguiente →';
      updateProgress();
    }

    function isCurrentAnswered() {
      const currentSection = sections[currentQuestion];
      const name = `q${currentQuestion + 1}`;
      return currentSection.querySelector(`input[name="${name}"]:checked`);
    }

    prevBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (currentQuestion > 0) {
        currentQuestion--;
        showQuestion(currentQuestion);
      }
    });

    nextBtn.addEventListener('click', (e) => {
      e.preventDefault();

      if (!isCurrentAnswered()) {
        alert('Por favor selecciona una opción para continuar');
        return;
      }

      if (currentQuestion < totalQuestions - 1) {
        currentQuestion++;
        showQuestion(currentQuestion);
      } else {
        // Mostrar resultado
        form.style.display = 'none';
        resultSection.classList.add('active');
      }
    });

    // Inicializar
    showQuestion(0);
  </script>
</body>
</html>
