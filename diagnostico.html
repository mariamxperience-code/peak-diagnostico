<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico - Método PEAK</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 30px;
      text-align: center;
    }

    .accent {
      color: #1cabb0;
    }

    .progress {
      width: 100%;
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #1cabb0;
      width: 0%;
      transition: width 0.3s ease;
    }

    form {
      display: none;
    }

    form.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .question-group {
      margin-bottom: 30px;
    }

    .question-group label {
      display: block;
      font-size: 1.1rem;
      margin-bottom: 15px;
      font-weight: 500;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      display: flex;
      align-items: center;
      padding: 12px;
      background: #1a1a1a;
      border: 2px solid #333333;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .option:hover {
      border-color: #1cabb0;
    }

    .option input[type="radio"] {
      margin-right: 12px;
      cursor: pointer;
      accent-color: #1cabb0;
      width: 18px;
      height: 18px;
    }

    .option input[type="radio"]:checked + span {
      color: #1cabb0;
      font-weight: 600;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 30px;
      justify-content: space-between;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button.prev {
      background: #333333;
      color: #ffffff;
      flex: 0 0 auto;
    }

    button.prev:hover {
      background: #444444;
    }

    button.prev:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.next, button.submit {
      background: #1cabb0;
      color: #0a0a0a;
      flex: 1;
    }

    button.next:hover, button.submit:hover {
      background: #15959b;
    }

    /* Resultado */
    .result {
      display: none;
      text-align: center;
    }

    .result.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .result h2 {
      font-size: 1.8rem;
      margin-bottom: 20px;
    }

    .result p {
      color: #cccccc;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .result a {
      display: inline-block;
      background: #1cabb0;
      color: #0a0a0a;
      padding: 14px 32px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }

    .result a:hover {
      background: #15959b;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.5rem;
      }

      .buttons {
        flex-direction: column;
      }

      button.prev {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Diagnóstico <span class="accent">PEAK</span></h1>
    <div class="progress">
      <div class="progress-bar"></div>
    </div>

    <form id="quizForm">
      <!-- Pregunta 1 -->
      <div class="question-group active-q" data-question="0">
        <label>1. ¿Cuántos miembros activos tiene tu centro?</label>
        <div class="options">
          <label class="option">
            <input type="radio" name="q1" value="0-50">
            <span>Menos de 50</span>
          </label>
          <label class="option">
            <input type="radio" name="q1" value="50-150">
            <span>50 a 150</span>
          </label>
          <label class="option">
            <input type="radio" name="q1" value="150-300">
            <span>150 a 300</span>
          </label>
          <label class="option">
            <input type="radio" name="q1" value="300+">
            <span>Más de 300</span>
          </label>
        </div>
      </div>

      <!-- Pregunta 2 -->
      <div class="question-group" data-question="1">
        <label>2. ¿Cuál es tu mayor desafío actualmente?</label>
        <div class="options">
          <label class="option">
            <input type="radio" name="q2" value="retention">
            <span>Retención de clientes</span>
          </label>
          <label class="option">
            <input type="radio" name="q2" value="acquisition">
            <span>Captar nuevos clientes</span>
          </label>
          <label class="option">
            <input type="radio" name="q2" value="operations">
            <span>Operación y procesos</span>
          </label>
          <label class="option">
            <input type="radio" name="q2" value="profitability">
            <span>Rentabilidad</span>
          </label>
        </div>
      </div>

      <!-- Pregunta 3 -->
      <div class="question-group" data-question="2">
        <label>3. ¿Tienes un sistema para gestionar tu negocio?</label>
        <div class="options">
          <label class="option">
            <input type="radio" name="q3" value="no">
            <span>No, lo manejo de forma manual</span>
          </label>
          <label class="option">
            <input type="radio" name="q3" value="partial">
            <span>Tengo algunas herramientas dispersas</span>
          </label>
          <label class="option">
            <input type="radio" name="q3" value="yes">
            <span>Sí, tengo un sistema integrado</span>
          </label>
        </div>
      </div>

      <!-- Pregunta 4 -->
      <div class="question-group" data-question="3">
        <label>4. ¿Cuánto inviertes mensualmente en tecnología?</label>
        <div class="options">
          <label class="option">
            <input type="radio" name="q4" value="0">
            <span>$0 - No invierto</span>
          </label>
          <label class="option">
            <input type="radio" name="q4" value="low">
            <span>$1 - $100 USD</span>
          </label>
          <label class="option">
            <input type="radio" name="q4" value="medium">
            <span>$100 - $500 USD</span>
          </label>
          <label class="option">
            <input type="radio" name="q4" value="high">
            <span>Más de $500 USD</span>
          </label>
        </div>
      </div>

      <!-- Pregunta 5 -->
      <div class="question-group" data-question="4">
        <label>5. ¿Qué tan probable es que aumentes tu inversión en mejora operativa?</label>
        <div class="options">
          <label class="option">
            <input type="radio" name="q5" value="very-unlikely">
            <span>Muy improbable</span>
          </label>
          <label class="option">
            <input type="radio" name="q5" value="unlikely">
            <span>Improbable</span>
          </label>
          <label class="option">
            <input type="radio" name="q5" value="likely">
            <span>Probable</span>
          </label>
          <label class="option">
            <input type="radio" name="q5" value="very-likely">
            <span>Muy probable</span>
          </label>
        </div>
      </div>

      <!-- Pregunta 6 -->
      <div class="question-group" data-question="5">
        <label>6. ¿Cuál es tu principal fuente de nuevos clientes?</label>
        <div class="options">
          <label class="option">
            <input type="radio" name="q6" value="referral">
            <span>Referidos</span>
          </label>
          <label class="option">
            <input type="radio" name="q6" value="social">
            <span>Redes sociales</span>
          </label>
          <label class="option">
            <input type="radio" name="q6" value="ads">
            <span>Publicidad pagada</span>
          </label>
          <label class="option">
            <input type="radio" name="q6" value="noone">
            <span>No tengo un sistema</span>
          </label>
        </div>
      </div>

      <!-- Pregunta 7 -->
      <div class="question-group" data-question="6">
        <label>7. ¿Cuántos empleados tiene tu equipo?</label>
        <div class="options">
          <label class="option">
            <input type="radio" name="q7" value="solo">
            <span>Solo yo</span>
          </label>
          <label class="option">
            <input type="radio" name="q7" value="1-3">
            <span>1 a 3 empleados</span>
          </label>
          <label class="option">
            <input type="radio" name="q7" value="4-10">
            <span>4 a 10 empleados</span>
          </label>
          <label class="option">
            <input type="radio" name="q7" value="10+">
            <span>Más de 10 empleados</span>
          </label>
        </div>
      </div>

      <!-- Pregunta 8 -->
      <div class="question-group" data-question="7">
        <label>8. ¿Cuál es tu objetivo principal para los próximos 6 meses?</label>
        <div class="options">
          <label class="option">
            <input type="radio" name="q8" value="growth">
            <span>Crecer en miembros</span>
          </label>
          <label class="option">
            <input type="radio" name="q8" value="efficiency">
            <span>Mejorar eficiencia</span>
          </label>
          <label class="option">
            <input type="radio" name="q8" value="revenue">
            <span>Aumentar ingresos</span>
          </label>
          <label class="option">
            <input type="radio" name="q8" value="scale">
            <span>Escalar el negocio</span>
          </label>
        </div>
      </div>

      <div class="buttons">
        <button type="button" class="prev" disabled>← Anterior</button>
        <button type="button" class="next">Siguiente →</button>
      </div>
    </form>

    <div class="result" id="result">
      <h2>Tu Diagnóstico está listo</h2>
      <p>Hemos analizado tus respuestas y estamos listos para mostrarte cómo Método PEAK puede transformar tu centro.</p>
      <p style="margin-bottom: 40px; color: #999999; font-size: 0.95rem;">Agenda tu sesión de consultoría gratuita con Mariam.</p>
      <a href="https://calendly.com/mariamxperience/metodo-peak" target="_blank">Agendar Sesión Gratuita</a>
    </div>
  </div>

  <script>
    let currentQuestion = 0;
    const questions = document.querySelectorAll('.question-group');
    const totalQuestions = questions.length;
    const prevBtn = document.querySelector('.prev');
    const nextBtn = document.querySelector('.next');
    const form = document.getElementById('quizForm');
    const resultDiv = document.getElementById('result');
    const progressBar = document.querySelector('.progress-bar');

    function updateProgress() {
      const percentage = ((currentQuestion + 1) / totalQuestions) * 100;
      progressBar.style.width = percentage + '%';
    }

    function showQuestion(index) {
      questions.forEach((q, i) => {
        q.classList.remove('active-q');
        if (i === index) q.classList.add('active-q');
      });

      prevBtn.disabled = index === 0;
      if (index === totalQuestions - 1) {
        nextBtn.innerHTML = 'Terminar';
      } else {
        nextBtn.innerHTML = 'Siguiente →';
      }

      updateProgress();
    }

    function isCurrentQuestionAnswered() {
      const question = questions[currentQuestion];
      const name = 'q' + (currentQuestion + 1);
      return document.querySelector(`input[name="${name}"]:checked`);
    }

    prevBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (currentQuestion > 0) {
        currentQuestion--;
        showQuestion(currentQuestion);
      }
    });

    nextBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (!isCurrentQuestionAnswered()) {
        alert('Por favor, selecciona una opción para continuar');
        return;
      }

      if (currentQuestion < totalQuestions - 1) {
        currentQuestion++;
        showQuestion(currentQuestion);
      } else {
        showResult();
      }
    });

    function showResult() {
      form.style.display = 'none';
      resultDiv.classList.add('active');
    }

    // Inicializar
    showQuestion(0);
  </script>
</body>
</html>
