<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico Método PEAK</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 650px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 30px;
      text-align: center;
      font-weight: 700;
    }

    .accent {
      color: #1cabb0;
    }

    .progress-bar {
      width: 100%;
      height: 5px;
      background: #1a1a1a;
      border-radius: 3px;
      margin-bottom: 40px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #1cabb0;
      width: 0%;
      transition: width 0.4s ease;
    }

    .form-section {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .form-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .question {
      margin-bottom: 30px;
    }

    .question label {
      display: block;
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-wrapper {
      display: flex;
      align-items: center;
      padding: 14px;
      background: #1a1a1a;
      border: 2px solid #333333;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .option-wrapper:hover {
      border-color: #1cabb0;
      background: #1f1f1f;
    }

    .option-wrapper input[type="radio"] {
      margin-right: 12px;
      cursor: pointer;
      accent-color: #1cabb0;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .option-text {
      flex: 1;
      cursor: pointer;
      font-size: 1rem;
    }

    .option-wrapper input[type="radio"]:checked + .option-text {
      color: #1cabb0;
      font-weight: 600;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 40px;
      justify-content: space-between;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button.prev {
      background: #333333;
      color: #ffffff;
      min-width: 120px;
    }

    button.prev:hover:not(:disabled) {
      background: #444444;
    }

    button.prev:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button.next {
      background: #1cabb0;
      color: #0a0a0a;
      flex: 1;
    }

    button.next:hover {
      background: #15959b;
    }

    .result-section {
      display: none;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    .result-section.active {
      display: block;
    }

    .result-section h2 {
      font-size: 2rem;
      color: #1cabb0;
      margin-bottom: 20px;
    }

    .result-section p {
      font-size: 1.05rem;
      color: #cccccc;
      margin-bottom: 15px;
      line-height: 1.6;
    }

    .cta-button {
      display: inline-block;
      margin-top: 30px;
      padding: 16px 40px;
      background: #1cabb0;
      color: #0a0a0a;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 700;
      font-size: 1.1rem;
      transition: background 0.2s ease;
    }

    .cta-button:hover {
      background: #15959b;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }

      .controls {
        flex-direction: column;
      }

      button.prev {
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Diagnóstico <span class="accent">PEAK</span></h1>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>

    <form id="diagForm">
      <!-- Q1 -->
      <div class="form-section active" data-q="1">
        <div class="question">
          <label>¿Cuántos miembros activos tiene tu centro?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q1" value="a">
              <span class="option-text">Menos de 50 miembros</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q1" value="b">
              <span class="option-text">50 a 150 miembros</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q1" value="c">
              <span class="option-text">150 a 300 miembros</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q1" value="d">
              <span class="option-text">Más de 300 miembros</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Q2 -->
      <div class="form-section" data-q="2">
        <div class="question">
          <label>¿Cuál es tu mayor desafío operativo?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q2" value="a">
              <span class="option-text">Retención de miembros</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q2" value="b">
              <span class="option-text">Captar nuevos miembros</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q2" value="c">
              <span class="option-text">Operación y procesos</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q2" value="d">
              <span class="option-text">Rentabilidad</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Q3 -->
      <div class="form-section" data-q="3">
        <div class="question">
          <label>¿Tienes un sistema integrado para gestionar tu negocio?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q3" value="a">
              <span class="option-text">No, todo es manual</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q3" value="b">
              <span class="option-text">Tengo herramientas dispersas</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q3" value="c">
              <span class="option-text">Sí, tengo un sistema integrado</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Q4 -->
      <div class="form-section" data-q="4">
        <div class="question">
          <label>¿Cuánto inviertes mensualmente en tecnología?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q4" value="a">
              <span class="option-text">$0 - No invierto</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q4" value="b">
              <span class="option-text">$1 - $100 USD</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q4" value="c">
              <span class="option-text">$100 - $500 USD</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q4" value="d">
              <span class="option-text">Más de $500 USD</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Q5 -->
      <div class="form-section" data-q="5">
        <div class="question">
          <label>¿Qué tan probable es que inviertas en mejorar operaciones?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q5" value="a">
              <span class="option-text">Muy improbable</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q5" value="b">
              <span class="option-text">Improbable</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q5" value="c">
              <span class="option-text">Probable</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q5" value="d">
              <span class="option-text">Muy probable</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Q6 -->
      <div class="form-section" data-q="6">
        <div class="question">
          <label>¿Cuál es tu principal fuente de nuevos clientes?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q6" value="a">
              <span class="option-text">Referidos</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q6" value="b">
              <span class="option-text">Redes sociales</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q6" value="c">
              <span class="option-text">Publicidad pagada</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q6" value="d">
              <span class="option-text">No tengo un sistema definido</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Q7 -->
      <div class="form-section" data-q="7">
        <div class="question">
          <label>¿Cuántos empleados tiene tu equipo?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q7" value="a">
              <span class="option-text">Solo yo</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q7" value="b">
              <span class="option-text">1 a 3 empleados</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q7" value="c">
              <span class="option-text">4 a 10 empleados</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q7" value="d">
              <span class="option-text">Más de 10 empleados</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Q8 -->
      <div class="form-section" data-q="8">
        <div class="question">
          <label>¿Cuál es tu objetivo principal para los próximos 6 meses?</label>
          <div class="options">
            <label class="option-wrapper">
              <input type="radio" name="q8" value="a">
              <span class="option-text">Crecer en cantidad de miembros</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q8" value="b">
              <span class="option-text">Mejorar la eficiencia operativa</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q8" value="c">
              <span class="option-text">Aumentar ingresos por miembro</span>
            </label>
            <label class="option-wrapper">
              <input type="radio" name="q8" value="d">
              <span class="option-text">Escalar a múltiples centros</span>
            </label>
          </div>
        </div>
      </div>

      <div class="controls">
        <button type="button" class="prev" disabled>← Anterior</button>
        <button type="button" class="next">Siguiente →</button>
      </div>
    </form>

    <div class="result-section" id="result">
      <h2>¡Diagnóstico Completado!</h2>
      <p>Hemos analizado tus respuestas y estamos listos para mostrarte cómo Método PEAK puede transformar tu centro.</p>
      <p style="font-size: 0.95rem; color: #999999; margin-bottom: 30px;">Agenda tu sesión de consultoría gratuita con Mariam para conocer tu plan personalizado.</p>
      <a href="https://calendly.com/mariamxperience/metodo-peak" class="cta-button" target="_blank">Agendar Sesión Gratuita</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('diagForm');
    const sections = document.querySelectorAll('.form-section');
    const prevBtn = document.querySelector('button.prev');
    const nextBtn = document.querySelector('button.next');
    const result = document.getElementById('result');
    const progressFill = document.querySelector('.progress-fill');

    let current = 0;
    const total = sections.length;

    function updateUI() {
      sections.forEach((s, i) => {
        s.classList.toggle('active', i === current);
      });
      progressFill.style.width = ((current + 1) / total * 100) + '%';
      prevBtn.disabled = current === 0;
      nextBtn.textContent = current === total - 1 ? 'Enviar →' : 'Siguiente →';
    }

    function isAnswered() {
      const name = 'q' + (current + 1);
      return document.querySelector(`input[name="${name}"]:checked`);
    }

    prevBtn.addEventListener('click', () => {
      if (current > 0) {
        current--;
        updateUI();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (!isAnswered()) {
        alert('Por favor selecciona una opción');
        return;
      }
      if (current < total - 1) {
        current++;
        updateUI();
      } else {
        form.style.display = 'none';
        result.classList.add('active');
      }
    });

    updateUI();
  </script>
</body>
</html>
