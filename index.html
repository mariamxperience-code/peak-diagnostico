<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Método PEAK - Diagnóstico 360°</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    .accent {
      color: #1cabb0;
    }

    .subtitle {
      font-size: 1rem;
      color: #cccccc;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .tally-wrapper {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      min-height: 600px;
      border: none;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }

      iframe {
        min-height: 700px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Método <span class="accent">PEAK</span></h1>
    <p class="subtitle">Descubre cómo optimizar tu centro de fitness con nuestro diagnóstico 360°</p>

    <div class="tally-wrapper">
      <iframe src="https://tally.so/embed/EkDvAr" width="100%" height="600" frameborder="0" marginheight="0" marginwidth="0" title="Diagnóstico Método PEAK"></iframe>

  </div>

</html>
